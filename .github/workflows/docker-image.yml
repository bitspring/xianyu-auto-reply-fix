name: Docker Image CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: dragon5018/xianyu-auto-reply   # 替换为你的 Docker Hub 用户名/仓库名

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录到 Docker Hub（仅在非 PR 事件时执行）
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 构建 Docker 镜像（使用 build-push-action，但不推送）
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile-cn
          load: true  # 将镜像加载到本地 docker 守护进程
          tags: ${{ env.IMAGE_NAME }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 使用构建的镜像启动容器进行测试
      - name: Run test container
        run: |
          docker run -d --name test-container \
            -p 8000:8090 \
            -e PYTHONUNBUFFERED=1 \
            -e DB_PATH=/app/data/test.db \
            -e LOG_LEVEL=INFO \
            ${{ env.IMAGE_NAME }}:test

      # 等待容器健康（使用内置健康检查或自定义循环）
      - name: Wait for container to be ready
        run: |
          timeout 90s bash -c '
            until docker inspect --format="{{json .State.Health.Status}}" test-container 2>/dev/null | grep -q "healthy"; do
              echo "Waiting for container to be healthy..."
              sleep 3
            done
          ' || (docker logs test-container && exit 1)

      # 测试 API 端点（通过映射的端口）
      - name: Test health endpoint
        run: |
          curl -f --retry 5 --retry-delay 3 --retry-connrefused http://localhost:8000/health

      # （可选）测试其他功能...

      # 清理测试容器
      - name: Clean up test container
        if: always()
        run: docker rm -f test-container

      # 构建并推送最终镜像（仅在 main 分支且非 PR 时执行）
      - name: Build and push Docker image
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile-cn
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 失败时输出容器日志
      - name: Show logs on failure
        if: failure()
        run: docker logs test-container
